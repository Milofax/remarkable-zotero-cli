name: Feature request
description: Suggest a workflow or annotation improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What would this help you do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the output you would expect.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Mention Zotero, reMarkable, PDF, or EPUB constraints if relevant.
